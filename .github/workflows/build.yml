name: Release

on:
  # 手动触发
  workflow_dispatch:
  # Push tags 时自动触发
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Run lint
        run: make lint

  cross-build:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Cross-compile for all platforms
        run: make cross-build

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mirra-binaries
          path: dist/mirra_*
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: cross-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: mirra-binaries
          path: dist

      - name: Get release notes from CHANGELOG
        id: release_notes
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Extracting release notes for ${TAG}"

          # Extract notes for this version from CHANGELOG.md
          awk -v tag="${TAG}" '
            /^## \[/ {
              if (p) exit
              if (index($0, "[" tag "]")) { p=1; next }
            }
            p { print }
          ' CHANGELOG.md > release_notes.txt

          # If no notes found, use default message
          if [ ! -s release_notes.txt ]; then
            echo "Release ${TAG}" > release_notes.txt
          fi

          echo "=== Release Notes ==="
          cat release_notes.txt
          echo "======================"

          echo "notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          draft: false
          prerelease: false
